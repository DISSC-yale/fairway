# Fairway Configuration Template
# This file configures the data ingestion pipeline, including tables, schema, validation, and enrichment.

# Name of the dataset being processed
dataset_name: "$name"

# Execution Engine: 'duckdb' (local/single-node) or 'pyspark' (distributed)
# Options: 'duckdb', 'pyspark'
# Default is 'duckdb' if not specified.
engine: "$engine_type"

# Storage Configuration (Medallion Layout)
# Directories are derived from root: root/raw, root/processed, root/curated
# Override any layer explicitly by uncommenting below.
storage:
  # Output root directory (default: "data")
  root: "data"

  # Override individual layers (uncomment to customize):
  # raw: "/custom/path/raw"
  # processed: "/fast/ssd/staging"
  # curated: "/shared/nfs/final"

  # Output format for processed files
  # Options: 'parquet' (default), 'delta' (requires pyspark + delta-spark)
  format: "parquet"

  # Optional: Temporary storage for intermediate writes (e.g., unzipping, scratch on HPC)
  # Supports environment variables like $USER.
  # Priority: FAIRWAY_TEMP env var > storage.temp
  # temp: "/scratch/$USER/fairway"

# ─────────────────────────────────────────────────────────────
# Tables - define your data sources
# ─────────────────────────────────────────────────────────────
tables:
  - name: "sales"
    # Root directory for file discovery.
    # Purpose:
    #   1. Enables relocatable manifests - move data to new location without re-processing
    #   2. Paths in manifest are stored relative to root
    #   3. If data moves, just update root; manifest entries remain valid
    root: "data/raw"

    # Path pattern relative to root (or absolute if root not specified)
    path: "sales_partitioned"
    hive_partitioning: true

    # Input format
    # Options: 'csv', 'tsv', 'tab', 'json', 'parquet', 'fixed_width'
    format: "csv"

    # Schema definition (Optional but recommended for strict validation)
    # Maps column names to their expected types.
    # Note: You can generate this schema using `fairway generate-schema`
    schema:
      id: "BIGINT"
      date: "TIMESTAMP"
      amount: "DOUBLE"
      address: "STRING"
      year: "INTEGER"
      month: "INTEGER"

    # Output layer — where the pipeline stops for this table
    # Options: 'curated' (default, full pipeline), 'processed' (validate + convert only)
    # Note: output_layer: processed cannot be used with transformation
    # output_layer: "curated"

    # Per-table validation overrides (shallow merge with global validations)
    # validations:
    #   min_rows: 500
    #   check_nulls: ["id", "amount"]
    #   check_range:
    #     amount: { min: 0 }

    # Write mode for output
    # Options: 'overwrite' (default), 'append'
    # write_mode: "overwrite"

    # Custom transformation script (Python file path)
    # The script should define a `transform(df)` function that takes and returns a DataFrame.
    # transformation: "transforms/sales_transform.py"

    # Regex pattern to extract metadata from filenames
    # Captured groups become columns in the output data.
    # naming_pattern: "sales_(?P<year>\\d{{4}})_(?P<month>\\d{{2}}).csv"

    # Glob expansion behavior
    # - false (default): glob pattern treated as single table unit
    # - true: each matching file becomes a separate table entry (for per-file metadata extraction)
    # expand_glob: false

    # Engine-specific read options (passed directly to read_csv/spark.read.options)
    # read_options:
    #   header: false
    #   skip: 1
    #   delim: "|"

    # Preprocessing Configuration (legacy unzip support)
    # preprocess:
    #   action: "unzip" # or path to script: "scripts/my_script.py"
    #   scope: "per_file" # or 'global'
    #   execution_mode: "driver" # or 'cluster' (requires pyspark)

  # Example: Archive handling with archives/files keys (recommended for zipped data)
  # Multiple tables can share the same archive - extracted once, cached.
  # - name: "customers_from_archive"
  #   root: "data/raw"
  #   archives: "data.zip"           # Archive pattern to extract
  #   files: "customers_*.csv"       # Pattern for files inside the archive
  #   format: "csv"

  # Example: Fixed-width text files (mainframe/legacy data)
  # Fixed-width files have columns at specific character positions (no delimiters).
  # A spec file defines column names, start positions, lengths, and types.
  # - name: "legacy_records"
  #   root: "data/raw"
  #   path: "*.txt"
  #   format: "fixed_width"
  #   fixed_width_spec: "specs/legacy_spec.yaml"  # Path to column spec file
  #   # Spec file format (YAML):
  #   #   columns:
  #   #     - name: id
  #   #       start: 0      # 0-indexed character position
  #   #       length: 5     # Number of characters
  #   #       type: INTEGER # Native engine type (INTEGER, STRING, DOUBLE, etc.) — VARCHAR auto-converted to STRING for Spark compatibility
  #   #       trim: true    # Optional: strip whitespace (default: false)
  #   #     - name: description
  #   #       start: 5
  #   #       length: 30
  #   #       type: STRING
  #   #       trim: true

  # Example: Handling Zipped Data with Metadata in Filename (legacy preprocess approach)
  # File: VM2Uniform--UT--2021-07-08.zip
  - name: "vm2_uniform"
    root: "data/vm2_raw"
    path: "*.zip"
    # Extract State, Year, Month, Day from filename automatically
    naming_pattern: "VM2Uniform--(?P<state>\\w{{2}})--(?P<year>\\d{{4}})-(?P<month>\\d{{2}})-(?P<day>\\d{{2}})\\.zip"
    format: "csv" # The format of the file INSIDE the zip
    preprocess:
      # Built-in 'unzip' action automatically handles extraction
      # Metadata (state, year, etc.) is extracted from the ZIP filename
      # and attached to the data found INSIDE the zip (e.g. data.csv)
      action: "unzip"
      scope: "per_file"
      execution_mode: "driver" # Set to 'cluster' if you have 1000s of files

    partition_by:
      - "year"
      - "month"

    # Static metadata to attach to all records from this table
    # metadata:
    #   source_system: "legacy_sales_db"
    #   environment: "production"

# ─────────────────────────────────────────────────────────────
# Validation Rules (Global Defaults)
# ─────────────────────────────────────────────────────────────
# Global validations apply to all tables. Per-table validations
# override global ones with shallow merge (see per-table example below).
validations:
  # Minimum row count — fail if dataset has fewer rows
  min_rows: 1
  # max_rows: 1000000

  # Columns that must not contain nulls
  # check_nulls:
  #   - "id"
  #   - "date"

  # Expected columns — fail if missing. Use strict: true to also fail on extras.
  # expected_columns: ["id", "date", "amount"]
  # expected_columns:
  #   columns: ["id", "date", "amount"]
  #   strict: true

  # Range bounds for numeric columns (nulls excluded)
  # check_range:
  #   year: { min: 1900, max: 2030 }
  #   age: { min: 0, max: 120 }

  # Allowed values (enum check, nulls excluded)
  # check_values:
  #   state: ["CT", "MA", "NY"]

  # Regex pattern (full-string match, nulls excluded)
  # check_pattern:
  #   fips_code: "^\\d{{5}}$"

# ─────────────────────────────────────────────────────────────
# Data Enrichment Configuration
# ─────────────────────────────────────────────────────────────
enrichment:
  # Enable geocoding for addresses (requires 'address' column)
  geocode: false

  # Add H3 spatial index (requires lat/lon or geocoding)
  # h3_index: false
  # h3_resolution: 9

# ─────────────────────────────────────────────────────────────
# Performance & Optimization
# ─────────────────────────────────────────────────────────────
performance:
  # Target number of rows per partition (used when salting is enabled)
  target_rows: 500000

  # Target parquet file size in MB (default: 128)
  # Uses heuristic of ~8000 rows/MB to calculate maxRecordsPerFile
  # Actual file size depends on data characteristics (column count, data types)
  # target_file_size_mb: 128

  # Direct control over max records per file (overrides target_file_size_mb heuristic)
  # Use this for precise control when the heuristic produces wrong-sized files
  # Example: If files are too small, increase this value
  # max_records_per_file: 1000000

  # Compression codec for parquet output
  # Options: 'snappy' (default), 'gzip', 'zstd', 'lz4', 'none'
  # compression: "snappy"

  # Enable partition salting to prevent data skew (default: false)
  # When enabled, adds a 'salt' column to distribute data evenly across partitions.
  # Only applies when partition_by is set.
  # salting: false

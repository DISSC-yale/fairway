site_name: Fairway Data Ingestion
site_description: Documentation for fairway ingestion pipelines.
site_author: DISSC

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
    - scheme: slate
      primary: blue grey
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - coverage:
      page_name: coverage
      html_report_dir: htmlcov

nav:
  - Welcome: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Components:
    - Engines: engines.md
    - Validations: validations.md
    - Enrichments: enrichments.md
    - Transformations: transformations.md
    - Manifest & Caching: manifest.md
  - Formats:
    - Supported Formats: supported_formats.md
    - Fixed-Width Files: fixed_width.md
  - Reference:
    - CLI Commands: cli.md
    - Schema Evolution: schema_evolution.md
    - Ingestion Options: ingestion_options.md
  - Operations:
    - Contributing: CONTRIB.md
    - Runbook: RUNBOOK.md
    - Release Notes: release.md
    - Coverage Report: coverage.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
